<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATOVEX - National Security Intelligence Division</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Lora:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Lora', 'Crimson Text', serif;
        }

        /* Main Background Container */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #F5F1E8 0%, #FFE5B4 50%, #DDE5D0 100%);
            z-index: 1;
            overflow: hidden;
        }

        /* Grid Overlay - Ashoka Chakra Pattern */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, rgba(198, 167, 94, 0.08) 1px, transparent 1px),
                linear-gradient(rgba(198, 167, 94, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(198, 167, 94, 0.04) 1px, transparent 1px);
            background-size: 80px 80px, 100px 100px, 100px 100px;
            z-index: 1;
            opacity: 0.6;
        }
        
        /* Ashoka Chakra Watermark Effect */
        .chakra-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            z-index: 0;
            opacity: 0.06;
            pointer-events: none;
        }
        
        .chakra-watermark::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid #C6A75E;
            border-radius: 50%;
            top: 0;
            left: 0;
        }
        
        .chakra-spoke {
            position: absolute;
            width: 2px;
            height: 50%;
            background: #C6A75E;
            left: 50%;
            top: 0;
            transform-origin: bottom center;
        }

        /* Radar Sweep */
        .radar-container {
            position: absolute;
            top: 10%;
            right: 5%;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(198, 167, 94, 0.15);
            border-radius: 50%;
            z-index: 2;
            opacity: 0.12;
        }

        .radar-sweep {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                rgba(198, 167, 94, 0.3) 0deg,
                rgba(198, 167, 94, 0.1) 30deg,
                transparent 60deg
            );
            animation: radarSpin 5s linear infinite;
        }

        @keyframes radarSpin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Aircraft Silhouettes */
        .aircraft-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 2;
            opacity: 0.06;
        }

        .aircraft {
            position: absolute;
            font-size: 3rem;
            color: #1A2A44;
            animation: float 20s infinite linear;
        }

        .aircraft-1 {
            top: 15%;
            left: -5%;
            animation-delay: 0s;
        }

        .aircraft-2 {
            top: 40%;
            right: -5%;
            animation-delay: 5s;
            transform: scaleX(-1);
        }

        .aircraft-3 {
            bottom: 20%;
            left: 5%;
            animation-delay: 10s;
        }

        @keyframes float {
            0% {
                transform: translateX(-10px) translateY(0);
            }
            100% {
                transform: translateX(calc(100vw + 20px)) translateY(0);
            }
        }

        /* Header Elements */
        .header-top {
            position: fixed;
            top: 20px;
            right: 30px;
            z-index: 10;
            color: #1A2A44;
            font-size: 0.80rem;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .footer-indicator {
            position: fixed;
            bottom: 20px;
            left: 30px;
            z-index: 10;
            color: #1A2A44;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #0B3D91;
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 8px rgba(11, 61, 145, 0.6);
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Main Title */
        .title-container {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .main-title {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 700;
            color: #1A2A44;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-family: 'Crimson Text', serif;
            text-shadow: 0 2px 8px rgba(26, 42, 68, 0.1);
        }
        
        /* Ashoka Emblem */
        .ashoka-emblem {
            width: 100px;
            height: 100px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .emblem-lion {
            font-size: 2.5rem;
            color: #C6A75E;
            text-shadow: 0 2px 6px rgba(198, 167, 94, 0.3);
        }
        
        .emblem-chakra {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid #C6A75E;
            border-radius: 50%;
            opacity: 0.4;
        }

        /* Content Wrapper */
        .content-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        /* Login Panel */
        .login-panel {
            background: rgba(245, 241, 232, 0.98);
            border: 2px solid #1A2A44;
            border-radius: 2px;
            padding: 50px 45px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(26, 42, 68, 0.12);
            backdrop-filter: blur(3px);
        }

        .panel-subtitle {
            font-size: 0.85rem;
            color: #1A2A44;
            text-align: center;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 35px;
            font-family: 'Lora', serif;
            line-height: 1.5;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.80rem;
            color: #1A2A44;
            margin-bottom: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            padding: 13px 15px;
            font-size: 1rem;
            border: 2px solid #1A2A44;
            background-color: rgba(255, 255, 255, 0.95);
            color: #1A2A44;
            font-family: 'Lora', serif;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
            outline: none;
            border-radius: 1px;
        }

        .form-input:focus {
            border-color: #0B3D91;
            background-color: #FFFFFF;
            box-shadow: 0 0 15px rgba(198, 167, 94, 0.3), inset 0 0 5px rgba(198, 167, 94, 0.1);
        }

        .form-input::placeholder {
            color: rgba(26, 42, 68, 0.4);
            font-family: 'Lora', serif;
        }

        /* Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #0B3D91;
            border: 2px solid #0B3D91;
            color: #FFFFFF;
            font-size: 0.92rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Lora', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 18px;
            border-radius: 1px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            transition: left 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #0B3D91;
            box-shadow: 0 0 20px rgba(198, 167, 94, 0.5), inset 0 0 10px rgba(198, 167, 94, 0.2);
            transform: translateY(-2px);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(0);
            box-shadow: 0 0 10px rgba(198, 167, 94, 0.3);
        }

        /* Warning Message */
        .warning-text {
            text-align: center;
            font-size: 0.72rem;
            color: #8B0000;
            margin-top: 22px;
            letter-spacing: 0.4px;
            font-family: 'Lora', serif;
            line-height: 1.5;
            font-weight: 500;
        }

        /* Success Message */
        .success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #FFE5B4 0%, #DDE5D0 100%);
            border: 3px solid #1A2A44;
            padding: 45px;
            text-align: center;
            z-index: 100;
            display: none;
            border-radius: 2px;
            max-width: 90%;
            width: 420px;
            box-shadow: 0 10px 40px rgba(26, 42, 68, 0.2);
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        .success-message h2 {
            color: #1A2A44;
            font-size: 1.6rem;
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .success-message p {
            color: #1A2A44;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-panel {
                padding: 40px 32px;
                max-width: 95%;
            }

            .main-title {
                font-size: clamp(2rem, 6vw, 3.5rem);
            }
            
            .ashoka-emblem {
                width: 80px;
                height: 80px;
            }
            
            .emblem-lion {
                font-size: 2rem;
            }
            
            .emblem-chakra {
                width: 65px;
                height: 65px;
                border-width: 1.5px;
            }

            .header-top {
                font-size: 0.70rem;
                right: 15px;
                top: 15px;
            }

            .footer-indicator {
                font-size: 0.68rem;
                bottom: 15px;
                left: 15px;
            }

            .radar-container {
                width: 150px;
                height: 150px;
                right: 3%;
                top: 8%;
            }

            .title-container {
                top: 25px;
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .login-panel {
                padding: 32px 22px;
                border-width: 1.5px;
            }

            .form-input {
                padding: 11px 12px;
                font-size: 0.95rem;
            }

            .submit-btn {
                padding: 12px;
                font-size: 0.80rem;
                letter-spacing: 1px;
            }

            .panel-subtitle {
                font-size: 0.75rem;
                letter-spacing: 1px;
            }

            .warning-text {
                font-size: 0.68rem;
            }

            .aircraft {
                font-size: 2rem;
            }
            
            .ashoka-emblem {
                width: 70px;
                height: 70px;
            }
            
            .emblem-lion {
                font-size: 1.8rem;
            }
            
            .emblem-chakra {
                width: 55px;
                height: 55px;
                border-width: 1px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Layer -->
    <div class="background-container">
        <div class="chakra-watermark"></div>
        <div class="grid-overlay"></div>
        
        <!-- Radar Sweep -->
        <div class="radar-container">
            <div class="radar-sweep"></div>
        </div>

        <!-- Aircraft Silhouettes -->
        <div class="aircraft-container">
            <div class="aircraft aircraft-1">✈</div>
            <div class="aircraft aircraft-2">✈</div>
            <div class="aircraft aircraft-3">✈</div>
        </div>
    </div>

    <!-- Header -->
    <div class="header-top">National Security Intelligence Division</div>
    
    <!-- Footer Indicator -->
    <div class="footer-indicator">
        <span class="status-dot"></span>
        Secure Network Status: Active
    </div>

    <!-- Title -->
    <div class="title-container">
        <h1 class="main-title">STRATOVEX</h1>
        
        <!-- Ashoka Emblem -->
        <div class="ashoka-emblem">
            <div class="emblem-chakra"></div>
            <div class="emblem-lion">🦁</div>
        </div>
    </div>

    <!-- Content -->
    <div class="content-wrapper">
        <!-- Login Panel -->
        <div class="login-panel">
            <div class="panel-subtitle">Final Authentication Layer<br>Defense Intelligence Network</div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="username" placeholder="Enter credentials" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Enter credentials" required>
                </div>

                <button type="submit" class="submit-btn">Grant Access</button>

                <div class="warning-text">
                    Unauthorized access attempts will trigger countermeasures
                </div>
            </form>
        </div>
    </div>

    <!-- Success Message -->
    <div class="success-message" id="successMessage">
        <h2>Access Granted</h2>
        <p>Authentication successful. National Security Intelligence Network secured.</p>
    </div>

    <script>
        // Form submission handler
        const loginForm = document.getElementById('loginForm');
        const successMessage = document.getElementById('successMessage');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Simple validation
            if (username.trim() && password.trim()) {
                // Show success message
                successMessage.classList.add('show');

                // Reset form
                loginForm.reset();

                // Hide success message after 3 seconds and reload
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 3000);
            }
        });

        // Input field animations
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
            });

            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        // Button click animation
        const submitBtn = document.querySelector('.submit-btn');
        submitBtn.addEventListener('mousedown', function() {
            this.style.transform = 'scaleY(0.95)';
        });

        submitBtn.addEventListener('mouseup', function() {
            this.style.transform = '';
        });

        // Radar sweep animation optimization
        const radarContainer = document.querySelector('.radar-container');
        
        // Subtle floating effect for radar
        let radarAngle = 0;
        setInterval(() => {
            radarAngle += 0.5;
            radarContainer.style.opacity = 0.15 + Math.sin(radarAngle * Math.PI / 180) * 0.05;
        }, 50);
    </script>
</body>
</html>
